*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#111;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
.hdr{background:#fff;padding:18px 16px 14px;border-bottom:1px solid #eee}

.hdr-sub{font-size:13px;color:#888;margin-top:3px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;display:flex;padding:8px 0 20px;z-index:100}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;padding:4px 0}
.bn-icon{font-size:20px}
.bn-label{font-size:10px;color:#aaa}
.bn-label.active{font-weight:600;color:#111}
.bn-dot{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:1px}
.bn-dot.active{background:#111}
.card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;margin:10px 14px}
.card-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:#111}

.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:1px solid #f5f5f5;cursor:pointer}
.cb{width:22px;height:22px;border-radius:7px;border:1.5px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cb.done{background:#1D9E75;border-color:#1D9E75}
.task-body{flex:1}
.block-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.task-label{font-size:13px;font-weight:500;color:#111;line-height:1.4}
.task-label.done{color:#bbb;text-decoration:line-through}
.task-detail{font-size:12px;color:#555;line-height:1.6;margin-top:5px;padding:8px;background:#f9f9f9;border-radius:8px}
.task-dur{font-size:11px;color:#1D9E75;font-weight:500;margin-top:3px}
.day-row{display:flex;gap:6px;padding:10px 14px;overflow-x:auto}
.day-btn{min-width:50px;padding:7px 5px;border-radius:10px;border:1.5px solid #eee;background:#fff;display:flex;flex-direction:column;align-items:center;gap:2px}
.day-btn.active{border-color:#111;background:#111}
.day-btn.done-day{border-color:#1D9E75;background:#E1F5EE}
.day-label{font-size:11px;font-weight:600;color:#888}
.day-btn.active .day-label{color:#fff}
.day-btn.done-day .day-label{color:#085041}
.day-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.day-btn.active .day-dot{background:#fff}
.day-btn.done-day .day-dot{background:#1D9E75}
.tab-row{display:flex;border-bottom:1px solid #eee;background:#fff}
.tab-btn{flex:1;padding:11px 0;font-size:13px;font-weight:400;color:#aaa;background:none;border:none;border-bottom:2px solid transparent}
.tab-btn.active{font-weight:600;color:#111;border-bottom:2px solid #111}
.state-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px}
.state-chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #eee;background:transparent;color:#888;cursor:pointer}
.energy-row{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #eee;background:#fff}
.energy-btn{flex:1;padding:7px 0;border-radius:10px;font-size:12px;border:1px solid #eee;background:#f5f5f5;color:#888;text-align:center}
.m-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid #f5f5f5}
.m-goal{font-size:13px;font-weight:500;color:#111}
.m-track{font-size:11px;color:#888;margin-top:1px}
.m-target{font-size:13px;font-weight:600;color:#1D9E75;flex-shrink:0}
.p-item{padding:11px 14px;border-top:1px solid #f5f5f5}
.p-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:#FAEEDA;color:#633806;margin-bottom:4px}
.p-text{font-size:13px;color:#111;line-height:1.5}
.ob-wrap{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.ob-body{flex:1;overflow-y:auto;padding:50px 24px 24px;display:flex;flex-direction:column;justify-content:center}
.ob-title{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:16px}
.ob-text{font-size:14px;line-height:1.85;opacity:.85}
.ob-foot{padding:16px 24px 40px;border-top:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:space-between}
.ob-dots{display:flex;gap:6px;align-items:center}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(0,0,0,.2);transition:width .2s}
.ob-dot.active{width:24px;background:rgba(0,0,0,.5)}
.ob-btn{padding:12px 28px;border-radius:14px;background:rgba(0,0,0,.7);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer}
.ob-skip{font-size:13px;color:rgba(0,0,0,.4);background:none;border:none;cursor:pointer}
.back-btn{display:flex;align-items:center;gap:6px;padding:14px 14px 8px;color:#666;font-size:14px;background:none;border:none;cursor:pointer}
.sec-label{padding:10px 14px 4px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em}
.score-wrap{padding:8px 14px 14px;display:flex;gap:10px;align-items:center}
.score-input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #eee;font-size:13px;background:#f9f9f9;color:#111}
.info-box{padding:10px 14px;font-size:12px;color:#555;line-height:1.6}
.overall-card{margin:10px 14px;background:#fff;border:1px solid #eee;border-radius:14px;padding:14px}
.overall-pct{font-size:36px;font-weight:700;color:#111}
.overall-sub{font-size:12px;color:#888;margin-top:6px}
.spacer{height:8px}
</style>

function getTasks(weekNum, dayIdx) {
  var isFri = dayIdx === 4;
  var isSat = dayIdx === 5;
  var isSun = dayIdx === 6;

  var morning = [
    {block:"Routine",  label:"Wake without your phone", detail:"Before touching your phone, sit up, take 3 slow breaths, and plant your feet on the floor. Phone stays face-down for the first 10 minutes.", dur:"5 min"},
    {block:"Body",     label:"Drink a full glass of water", detail:"Keep a glass on your nightstand so this requires zero effort. Do it before anything else.", dur:"1 min"},

    {block:"Mind",     label:"Morning Pages", detail:"Open your dedicated Morning Pages notebook. Write 3 full pages, stream of consciousness. Do not plan, edit, or reread. Just write whatever is in your head. Set a timer for 25 minutes.", dur:"25 min"},
    {block:"Planning", label:"Check Apple Calendar", detail:"Open Apple Calendar. Read what is scheduled today. Note any meetings or commitments that affect your available time. Close the app after 5 minutes.", dur:"5 min"},
    {block:"Planning", label:"Write today plan in physical planner", detail:"Open your physical planner. Write 3 to 5 tasks. Next to each task write how many minutes you are committing to it. Example: Jewelry store name brainstorm 20 min. You are committing to the time, not to finishing.", dur:"5-10 min"}
  ];

  var evening = [
    {block:"Mind",    label:"Google Keep brain sweep", detail:"Open Google Keep. Dump everything still in your head: worries, ideas, tomorrow tasks, things people said. This takes 3 minutes and clears your mind so it stops running loops while you try to sleep.", dur:"3 min"},
    {block:"Mind",    label:"Apple Journal 2 sentences", detail:"Open Apple Journal. Write exactly 2 sentences: how today felt, and one thing for tomorrow. Do not write more. The habit matters more than the length.", dur:"3 min"},
    {block:"Routine", label:"Open Routinery and run Evening Anchor", detail:"Open Routinery and tap your Evening Anchor routine. Follow each step. This includes skincare, brushing teeth, and any other personal care steps you have added.", dur:"15-20 min"},
    {block:"Routine", label:"One physical reset", detail:"Pick exactly one: dishes done, bag packed for tomorrow, desk cleared, or tomorrow outfit laid out. One only. This signals to your brain that the day is closed.", dur:"5-10 min"},
    {block:"Routine", label:"Phone on charger screens off by 11pm", detail:"Put your phone on the charger across the room or outside your bedroom. No social feeds, no email, no scrolling after this point.", dur:"Immediate"}
  ];

  var soul    = {block:"Soul",    label:"Faith moment", detail:"Open your Bible app or Enduring Word. Read one passage or chapter. Spend 5 minutes in quiet reflection or prayer. Keep this at the same time each day to build the habit.", dur:"5-10 min"};
  var nourish = {block:"Body",    label:"Log meals in Nourish", detail:"Open Nourish after each meal and log what you ate. If you skipped a meal, log it as skipped. The habit of opening the app matters more than perfection.", dur:"2 min per meal"};
  var outlookScan = {block:"Work", label:"Scan Outlook for fires only 5 min max", detail:"Open Outlook. You are not processing your inbox. You are checking for anything urgent that changes today plan. If nothing is on fire, close Outlook and do not open it again until your self-org block this afternoon.", dur:"5 min"};
  var selfOrg = {block:"Planning", label:"Afternoon self-org block 30 min", detail:"Open Google Keep. Move any captured notes into your physical planner or Notion. Update today task list: mark what is done, move what is unfinished to tomorrow. This is your daily system maintenance.", dur:"30 min"};
  var workBlock = {block:"Work", label:"Work catchup deep work block", detail:"Open your physical planner and pick the highest priority work task. Set your Clock app timer for 25 minutes. Work on that task only: phone on silent, Outlook and Slack closed. When the timer goes off take a 5-minute break then repeat for a second block.", dur:"50-75 min"};

  var artPractice = function(mins, note) {
    return {block:"Creative", label:"Daily art practice " + mins + " min", detail:"Set your Clock app timer for " + mins + " minutes. Open your sketchbook or art supplies. Make something. Do not judge it. " + (note || ""), dur:mins + " min"};
  };
  var jewelryTask = function(task, detail) {
    return {block:"Business", label:"Jewelry store: " + task, detail:"Open Notion and go to your 12-Week Business Hub. " + detail, dur:"20-30 min"};
  };
  var substackTask = function(task, detail) {
    return {block:"Creative", label:"Substack: " + task, detail:detail, dur:"20-45 min"};
  };
  var movement = function(type, detail) {
    return {block:"Body", label:"Movement: " + type, detail:detail, dur:"20-45 min"};
  };

  var tasks = [];

  if (isSun) {
    tasks = morning.concat([
      soul, nourish,
      {block:"Planning", label:"Weekly Review: score last week", detail:"Open this app. Go to the current week. Count how many tasks you completed versus how many were planned. Write your score in the Week State tab. Be honest. This is data not judgment.", dur:"10 min"},
      {block:"Planning", label:"Set system state for the week ahead", detail:"Open this app. Go to next week. Tap Week State. Choose Recovery, Stabilization, Maintenance, or Growth based on how you are feeling going into the week.", dur:"5 min"},
      {block:"Planning", label:"Read next week tasks", detail:"Open this app. Go to next week. Read every daily task for Monday through Sunday so nothing surprises you.", dur:"10 min"},
      {block:"Planning", label:"Block deep work slots in Apple Calendar", detail:"Open Apple Calendar. Create blocks for the week: Deep Work Work on Monday and Wednesday morning, Deep Work Creative on Tuesday and Thursday evening, Project Block on Friday afternoon. Treat them as unmovable appointments.", dur:"10 min"},
      {block:"Rest",     label:"Intentional rest no screens if possible", detail:"Spend at least 30 minutes doing something that restores you without a screen. Read a physical book, sit outside, cook something you enjoy, listen to music.", dur:"30+ min"},

  } else if (isSat) {
    var awChapter = weekNum > 0 ? weekNum : 1;

      soul, nourish,

      {block:"Rest", label:"Free time: protect it", detail:"Saturday evenings are yours. Watch something, go out, rest, or create. No work email and no project stress.", dur:"Rest"}
    ]).concat(evening);

  } else if (isFri) {
    tasks = morning.concat([
      outlookScan, soul, nourish, workBlock, selfOrg,
      movement("walk or workout", "Open Nike Run Club or Nike Training Club. Friday movement sets up a good weekend. Even a 20-minute walk counts."),
      artPractice(20, "Friday art practice is low pressure. Sketch something from your day or whatever feels natural."),
      {block:"Community", label:"Reach out to one person", detail:"Send a voice note, call, or text one friend or family member with genuine intention. A direct personal reach-out. Ask a real question and mean it.", dur:"10-15 min"}
    ]).concat(evening);

  } else if (dayIdx === 0) {
    var jTask = weekNum <= 3
      ? jewelryTask("brand foundation writing", "Open a new page titled Brand Foundation. Answer in writing: What does this brand stand for beyond selling jewelry? Who is your customer? How does the social impact model work? Write freely for 20 minutes.")

      ? jewelryTask("product selection", "Open your Product Selection page. Research 3 new product options today. For each one write: name, supplier, price point, and why it fits the brand.")

      outlookScan, sTask,
      artPractice(weekNum <= 3 ? 15 : weekNum <= 6 ? 25 : 35, "Tuesday art practice: work on something from This Is Not A Sketchbook. Complete the next exercise."),
      selfOrg, soul, nourish,
      movement("workout", "Open Nike Training Club. Select a workout that matches your energy. Complete the full session."),
      {block:"Community", label:"Check in with one person", detail:"Send a voice note to one friend or family member you have not spoken to recently. Keep it simple: Hey thinking of you how are you doing.", dur:"5-10 min"}
    ]).concat(evening);

  } else if (dayIdx === 2) {
    var j2Task = weekNum <= 3
      ? jewelryTask("social impact model", "Add a new section called Social Impact Model. Write: which 2 to 3 local organizations will receive proceeds, what percentage per sale, and how you will report impact to customers in your newsletter.")
      : weekNum <= 6
      ? jewelryTask("branding and visual identity", "Open Pinterest or Milanote. Spend 20 minutes collecting images that represent your brand direction. Then write 3 sentences in Notion describing what you want the brand to look and feel like.")
      : jewelryTask("newsletter and marketing", "Open your Newsletter page in Notion. Draft your first customer newsletter: brand introduction, social impact mission, and a preview of your first products.");
    tasks = morning.concat([
      outlookScan, workBlock, j2Task, selfOrg, soul, nourish,
      movement("walk", "Open Nike Run Club. Wednesday walk is your midweek reset. Go somewhere new if possible to build local familiarity."),
      artPractice(weekNum <= 3 ? 15 : weekNum <= 6 ? 25 : 35, "Wednesday art practice: free exploration. No instructions, no exercises. Make whatever you feel like making.")
    ]).concat(evening);

    var commTask = weekNum >= 4
      ? {block:"Community", label:"Dinner club or community planning", detail:"Open your notes and review the dinner club plan. If you have not floated the idea yet, text or call 3 people today with a specific date and concept. If you have floated it, follow up with confirmations.", dur:"20-30 min"}
      : {block:"Community", label:"Intentional community contact", detail:"Call or text one friend or family member you have been meaning to reach. Make it a real conversation not a quick check-in.", dur:"15 min"};
    tasks = morning.concat([
      outlookScan, workBlock,
      artPractice(weekNum <= 3 ? 15 : weekNum <= 6 ? 25 : 40, weekNum >= 7 ? "Thursday art practice is your longest session of the week. Work on a piece you want to develop further." : "Thursday art practice: complete an exercise from This Is Not A Sketchbook."),
      selfOrg, soul, nourish,
      movement("workout", "Open Nike Training Club. Thursday workout: push a little harder than Tuesday since the weekend is coming."),

var WEEK_META = [
  {week:0,  label:"Before Week 1", state:"Stabilization", score:null,  theme:"Do these first in this order",           hasDays:false, setup:[

var state = {
  view:"today", onboarding:true, obStep:0,
  selWeekIdx:null, selDayIdx:0, weekTab:"days",
  checked:{}, wstate:{}, wscore:{}, energy:"Medium", openTasks:{}
};

function load() {
  try {
    if (localStorage.getItem("ob2"))   state.onboarding = false;
    var c  = localStorage.getItem("chk2"); if (c)  state.checked = JSON.parse(c);
    var ws = localStorage.getItem("wst2"); if (ws) state.wstate  = JSON.parse(ws);
    var sc = localStorage.getItem("wsc2"); if (sc) state.wscore  = JSON.parse(sc);
    var en = localStorage.getItem("en2");  if (en) state.energy  = en;
  } catch(e) {}
}

function save(key, val) {
  try { localStorage.setItem(key, typeof val === "string" ? val : JSON.stringify(val)); } catch(e) {}
}

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(buildView());
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === "class")       e.className = attrs[k];
      else if (k === "style")  Object.assign(e.style, attrs[k]);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (c == null) return;
      if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}

function div(cls, children, extra) {
  return el("div", Object.assign({class:cls||""}, extra||{}), children);
}

function btn(cls, text, onClick) {
  return el("button", {class:cls||"", onClick:onClick}, text);
}

function getSC(s) { return STATE_COLORS[s] || STATE_COLORS.Maintenance; }

function checkmark() {
  var svg  = document.createElementNS("http://www.w3.org/2000/svg","svg");
  var path = document.createElementNS("http://www.w3.org/2000/svg","path");
  svg.setAttribute("width","12"); svg.setAttribute("height","12");
  svg.setAttribute("viewBox","0 0 12 12"); svg.setAttribute("fill","none");
  path.setAttribute("d","M2 6l3 3 5-5");
  path.setAttribute("stroke","#fff");
  path.setAttribute("stroke-width","1.8");
  path.setAttribute("stroke-linecap","round");
  path.setAttribute("stroke-linejoin","round");
  svg.appendChild(path);
  return svg;
}

function getDayPct(weekNum, dayIdx) {
  var tasks = getTasks(weekNum, dayIdx);
  var done  = tasks.filter(function(_, i) { return state.checked["w"+weekNum+"d"+dayIdx+"t"+i]; }).length;
  return tasks.length > 0 ? Math.round((done / tasks.length) * 100) : 0;
}

function getWeekPct(wm) {
  if (!wm.hasDays) {
    var setup = wm.setup || [];
    var done  = setup.filter(function(_, i) { return state.checked["w"+wm.week+"s"+i]; }).length;
    return setup.length > 0 ? Math.round((done / setup.length) * 100) : 0;
  }
  var total = 0, done = 0;
  for (var d = 0; d < 7; d++) {
    var tasks = getTasks(wm.week, d);
    total += tasks.length;
    done  += tasks.filter(function(_, i) { return state.checked["w"+wm.week+"d"+d+"t"+i]; }).length;
  }
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function bottomNav() {
  var items = [
    {icon:"sunrise", label:"Today",    v:"today"},
    {icon:"calendar",label:"Weeks",    v:"weeks"},
    {icon:"chart",   label:"Measures", v:"measures"},
    {icon:"park",    label:"Parking",  v:"parking"}

  var icons = {sunrise:"☀️", calendar:"📅", chart:"📊", park:"🅿️", assist:"🤖"};
  return div("bottom-nav", items.map(function(item) {
    var active = state.view === item.v || (item.v === "weekDetail" && state.view === "weekDetail");
    return el("button", {class:"bn-btn", onClick:function() { state.view = item.v; render(); }}, [
      div("bn-icon", icons[item.icon]),
      el("div", {class:"bn-label" + (active ? " active" : "")}, item.label),
      div("bn-dot" + (active ? " active" : ""), null)
    ]);
  }));
}

function taskItem(task, id) {
  var done = !!state.checked[id];
  var open = !!state.openTasks[id];
  var bs   = BLOCK_STYLE[task.block] || {bg:"#eee", text:"#666"};

  var cbEl = el("div", {class:"cb" + (done ? " done" : ""), onClick:function(e) {
    e.stopPropagation();
    state.checked[id] = !state.checked[id];
    save("chk2", state.checked);
    render();
  }}, done ? [checkmark()] : null);

  var bodyChildren = [
    el("span", {class:"block-tag", style:{background:bs.bg, color:bs.text}}, task.block),
    el("div",  {class:"task-label" + (done ? " done" : "")}, task.label)
  ];
  if (open && task.detail) bodyChildren.push(el("div", {class:"task-detail"}, task.detail));
  bodyChildren.push(el("div", {class:"task-dur"}, task.dur));

  return el("div", {class:"task-row", onClick:function() {
    state.openTasks[id] = !state.openTasks[id];
    render();
  }}, [cbEl, div("task-body", bodyChildren)]);
}

function buildOnboarding() {
  var s    = ONBOARDING[state.obStep];
  var wrap = div("ob-wrap", null);

  var lines = s.body.split("\n").map(function(line) {
    return el("div", {style:{marginBottom:"8px"}}, line || " ");
  });

  var body = el("div", {class:"ob-body", style:{background:s.bg}}, [
    el("div", {class:"ob-title", style:{color:s.text}}, s.title),
    el("div", {class:"ob-text",  style:{color:s.text}}, lines)
  ]);

  var dots = div("ob-dots", ONBOARDING.map(function(_, i) {
    return div("ob-dot" + (i === state.obStep ? " active" : ""), null);
  }));

  var isLast = state.obStep === ONBOARDING.length - 1;
  var nextBtn = btn("ob-btn", isLast ? "Start my plan" : "Next", function() {
    if (isLast) { state.onboarding = false; save("ob2","1"); }
    else state.obStep++;
    render();
  });
  var skipBtn = !isLast ? btn("ob-skip", "Skip", function() {
    state.onboarding = false; save("ob2","1"); render();
  }) : null;

  var foot = div("ob-foot", [dots, div("", [skipBtn, nextBtn].filter(Boolean))]);
  wrap.appendChild(body);
  wrap.appendChild(foot);
  return wrap;
}

function buildToday() {
  var today  = new Date();
  var dayIdx = (today.getDay() + 6) % 7;

  var allTasks = getTasks(weekNum, dayIdx);

  var filtered = state.energy === "Low"

function buildWeeks() {
  var totalTasks = 0, totalDone = 0;
  WEEK_META.forEach(function(wm) {
    if (!wm.hasDays) {
      totalTasks += (wm.setup||[]).length;
      totalDone  += (wm.setup||[]).filter(function(_, i) { return state.checked["w"+wm.week+"s"+i]; }).length;
    } else {
      for (var d = 0; d < 7; d++) {
        var tasks = getTasks(wm.week, d);
        totalTasks += tasks.length;
        totalDone  += tasks.filter(function(_, i) { return state.checked["w"+wm.week+"d"+d+"t"+i]; }).length;
      }
    }
  });
  var ovPct = totalTasks > 0 ? Math.round((totalDone / totalTasks) * 100) : 0;

  var weekCards = WEEK_META.map(function(wm, i) {
    var pct = getWeekPct(wm);
    var sc  = getSC(wm.state);
    var card = div("week-card", null);
    card.addEventListener("click", function() {
      state.selWeekIdx = i; state.selDayIdx = 0;
      state.weekTab = "days"; state.view = "weekDetail";
      render();
    });
    card.appendChild(el("div", {class:"week-head", style:{background:sc.bg}}, [
      el("div", {class:"week-title", style:{color:sc.text}}, wm.label),
      el("div", {class:"week-theme", style:{color:sc.text}}, wm.theme),
      el("div", {class:"prog-bar"}, [el("div", {class:"prog-fill", style:{width:pct+"%", background:sc.dot}}, null)]),
      el("div", {class:"week-pct", style:{color:sc.text}}, pct > 0 ? pct+"% complete" : (wm.score ? "Target "+wm.score : "Tap to open"))
    ]));
    return card;
  });

  return div("", [
    el("div", {class:"hdr"}, [
      el("div", {class:"hdr-title"}, "All Weeks"),
      el("div", {class:"hdr-sub"},   "Tap a week to open daily tasks")
    ]),
    div("spacer", null),
    div("overall-card", [
      el("div", {style:{fontSize:"12px",color:"#888",marginBottom:"4px"}}, "Overall progress"),
      el("div", {class:"overall-pct"}, ovPct+"%"),

      el("div", {class:"overall-sub"}, totalDone + " tasks complete")
    ]),
    div("", weekCards),
    bottomNav()
  ]);

ocus timer\n\nWhen suggesting habit stacks:\n- Use existing anchors: morning routine, meals, movement, evening routine\n- Keep stacks to 2-3 habits maximum\n- Always attach new habits to existing strong anchors\n\nTone: calm, direct, practical, non-preachy. No hustle culture. Assume variable energy. Short answers preferred unless detail is requested.";

function buildAssistant() {
  var chatHistory = div("", [], {style:{flex:"1",overflowY:"auto",padding:"10px 14px",display:"flex",flexDirection:"column",gap:"10px"}});

  function renderMessages() {
    chatHistory.innerHTML = "";
    if (assistantMessages.length === 0) {
      var suggestions = [
        "What should I focus on this week?",
        "Suggest an Apple Shortcut for my morning routine",
        "How do I habit stack my faith practice?",
        "I had a low energy week. What do I adjust?",
        "Help me optimize my evening routine",
        "What tasks can I combine to save time?"
      ];
      chatHistory.appendChild(div("", [
        el("div", {style:{fontSize:"14px",fontWeight:"600",color:"#111",marginBottom:"6px"}}, "Hi, I know your full 12-week plan."),
        el("div", {style:{fontSize:"13px",color:"#666",lineHeight:"1.6",marginBottom:"14px"}}, "Ask me anything about your plan, routines, habit stacks, or Apple Shortcuts."),
        div("", suggestions.map(function(s) {
          return el("div", {
            style:{padding:"10px 12px",background:"#f5f5f5",borderRadius:"10px",fontSize:"13px",color:"#333",cursor:"pointer",marginBottom:"6px"},
            onClick:function() { sendMessage(s); }
          }, s);
        }))
      ], {style:{padding:"4px 0"}}));
      return;
    }
    assistantMessages.forEach(function(msg) {
      var isUser = msg.role === "user";
      chatHistory.appendChild(el("div", {
        style:{
          display:"flex",
          justifyContent: isUser ? "flex-end" : "flex-start"
        }
      }, [
        el("div", {
          style:{
            maxWidth:"85%",
            padding:"10px 13px",
            borderRadius: isUser ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
            background: isUser ? "#111" : "#fff",
            border: isUser ? "none" : "1px solid #eee",
            fontSize:"13px",
            color: isUser ? "#fff" : "#111",
            lineHeight:"1.6",
            whiteSpace:"pre-wrap"
          }
        }, msg.content)
      ]));
    });
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  var isLoading = false;

  function sendMessage(text) {
    if (isLoading || !text.trim()) return;
    assistantMessages.push({role:"user", content:text.trim()});
    isLoading = true;
    renderMessages();

    var loadingEl = el("div", {
      style:{display:"flex",justifyContent:"flex-start"}
    }, [
      el("div", {
        style:{padding:"10px 13px",borderRadius:"14px 14px 14px 4px",background:"#fff",border:"1px solid #eee",fontSize:"13px",color:"#888"}
      }, "Thinking...")
    ]);
    chatHistory.appendChild(loadingEl);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    var messages = assistantMessages.slice(0, -1).concat([{role:"user",content:text.trim()}]);

    fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": API_KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:ASSISTANT_SYSTEM,
        messages:messages
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      isLoading = false;
      loadingEl.remove();
      var reply = data.content && data.content[0] ? data.content[0].text : "Sorry, I could not get a response. Please try again.";
      assistantMessages.push({role:"assistant", content:reply});
      renderMessages();
    })
    .catch(function(err) {
      isLoading = false;
      loadingEl.remove();
      assistantMessages.push({role:"assistant", content:"Something went wrong. Check your internet connection and try again."});
      renderMessages();
    });
  }

  renderMessages();

  var inputRow = div("", null, {style:{display:"flex",gap:"8px",padding:"10px 14px 20px",background:"#fff",borderTop:"1px solid #eee"}});

  var input = el("input", {
    placeholder:"Ask about your plan...",
    style:{flex:"1",padding:"10px 12px",borderRadius:"22px",border:"1px solid #eee",fontSize:"14px",background:"#f9f9f9",color:"#111",outline:"none"}
  }, null);

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      var val = input.value;
      input.value = "";
      sendMessage(val);
    }
  });

  var sendBtn = el("button", {
    style:{width:"40px",height:"40px",borderRadius:"50%",background:"#111",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"},
    onClick:function() {
      var val = input.value;
      input.value = "";
      sendMessage(val);
    }
  }, [
    el("svg", {width:"16",height:"16",viewBox:"0 0 16 16",fill:"none"}, [
      el("path", {d:"M2 8L14 2L10 8L14 14L2 8Z",fill:"#fff"}, null)
    ])
  ]);

  inputRow.appendChild(input);
  inputRow.appendChild(sendBtn);

  var clearBtn = el("button", {
    style:{background:"none",border:"none",fontSize:"12px",color:"#aaa",cursor:"pointer",padding:"0 14px 6px",textAlign:"right",display:"block",width:"100%"},
    onClick:function() { assistantMessages = []; renderMessages(); }
  }, "Clear conversation");

  return el("div", {
    style:{display:"flex",flexDirection:"column",height:"100vh",maxHeight:"100vh",background:"#f9f9f9",paddingBottom:"90px"}
  }, [
    el("div", {class:"hdr"}, [
      el("div", {class:"hdr-title"}, "Assistant"),
      el("div", {class:"hdr-sub"}, "Knows your full 12-week plan")
    ]),
    clearBtn,
    chatHistory,
    inputRow,
    bottomNav()
  ]);
}
  
function buildParking() {
  return div("", [
    el("div", {class:"hdr"}, [
      el("div", {class:"hdr-title"}, "Parking Lot"),
      el("div", {class:"hdr-sub"},   "Deferred decisions: revisit at the right time")
    ]),
    div("spacer", null),
    div("card", PARKING.map(function(p) {
      return div("p-item", [div("p-tag", p.tag), div("p-text", p.text)]);
    })),
    bottomNav()
  ]);
}

function buildView() {
  var wrap = div("", null);
  if (state.onboarding)         { wrap.appendChild(buildOnboarding()); return wrap; }
  if (state.view === "today")      wrap.appendChild(buildToday());
  else if (state.view === "weeks") wrap.appendChild(buildWeeks());
  else if (state.view === "weekDetail") wrap.appendChild(buildWeekDetail());
  else if (state.view === "measures")   wrap.appendChild(buildMeasures());
  else if (state.view === "parking")    wrap.appendChild(buildParking());
  else if (state.view === "assistant")  wrap.appendChild(buildAssistant());
  return wrap;
}

load();
render();
</script>
</body>
</html>
