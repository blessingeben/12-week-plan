<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="12 Week Year"/>
<title>12 Week Year</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sand:#F5F0E8;--sand-d:#EDE5D4;--sand-dd:#E0D8C8;
  --ink:#2C2419;--ink-m:#5C4F3A;--ink-l:#8C7E6A;
  --terra:#A0522D;--terra-l:#C47A45;--terra-p:#F0E0CC;
  --sage:#3D6B3D;--sage-p:#DDE8DD;
  --gold:#7A5C10;--gold-p:#F5ECC0;
  --skip:#b33030;--skip-p:#FCEBEB;
  --border:rgba(92,79,58,0.15);--border-m:rgba(92,79,58,0.28);
}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--sand);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;font-size:16px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}

/* ── HEADER ── */
.hdr{background:#fff;padding:14px 16px 11px;border-bottom:1px solid var(--border)}
.hdr-title{font-family:'Lora',Georgia,serif;font-size:19px;font-weight:500;color:var(--ink)}
.hdr-sub{font-size:12px;color:var(--ink-l);margin-top:2px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.state-badge{padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:.02em}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;padding:4px 0}
.bn-icon{font-size:16px}
.bn-label{font-size:9px;color:#aaa;font-family:'Crimson Pro',serif;letter-spacing:.02em}
.bn-label.active{font-weight:700;color:var(--ink)}
.bn-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
.bn-dot.active{background:var(--terra)}

/* ── ENERGY BAR ── */
.energy-bar{display:flex;gap:6px;padding:9px 14px;background:#fff;border-bottom:1px solid var(--border)}
.e-btn{flex:1;padding:7px 4px;border-radius:10px;font-family:'Crimson Pro',serif;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--sand);color:var(--ink-l);text-align:center;transition:all .15s}
.e-btn.active-low{background:#FCEBEB;border-color:#E24B4A;color:#791F1F;font-weight:600}
.e-btn.active-medium{background:#FAEEDA;border-color:#EF9F27;color:#633806;font-weight:600}
.e-btn.active-high{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:600}

/* ── DAY STRIP ── */
.day-strip{display:flex;gap:5px;padding:9px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border)}
.day-pill{min-width:44px;padding:7px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--sand);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex-shrink:0;transition:all .15s}
.day-pill.today{border-color:var(--ink);background:var(--ink)}
.day-pill.done{border-color:var(--sage);background:var(--sage-p)}
.dp-name{font-size:10px;font-weight:600;color:var(--ink-l);font-family:'Crimson Pro',serif}
.day-pill.today .dp-name{color:#fff}
.day-pill.done .dp-name{color:var(--sage)}
.dp-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.day-pill.today .dp-dot{background:#fff}
.day-pill.done .dp-dot{background:var(--sage)}

/* ── PROGRESS STRIP ── */
.progress-strip{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.prog-track{flex:1;height:4px;background:var(--sand-dd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;background:var(--sage)}
.prog-label{font-size:12px;color:var(--ink-l);white-space:nowrap;font-family:'Crimson Pro',serif}
.prog-pct{font-size:13px;font-weight:700;color:var(--sage);white-space:nowrap;font-family:'Lora',serif}

/* ── WEEK SELECTOR ── */
.week-sel-row{display:flex;align-items:center;gap:6px;padding:8px 14px 6px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto}
.week-sel-lbl{font-size:11px;font-weight:600;color:var(--ink-l);flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;font-family:'Crimson Pro',serif}
.week-pill{padding:4px 10px;border-radius:8px;font-size:11px;font-family:'Crimson Pro',serif;background:var(--sand);color:var(--ink-l);border:1px solid var(--border);flex-shrink:0;transition:all .15s}
.week-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}

/* ── TASK ITEMS ── */
.task-item{background:#fff;border-bottom:1px solid rgba(92,79,58,0.07)}
.task-item.skipped{background:#fdf8f8}
.task-main{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 10px 14px}
.task-status-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0;margin-top:1px}
.ts-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border-m);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s;line-height:1}
.ts-btn.done-btn.active{background:var(--sage);border-color:var(--sage)}
.ts-btn.skip-btn.active{background:var(--skip);border-color:var(--skip)}
.ts-btn svg{pointer-events:none}
.task-content{flex:1;min-width:0;cursor:pointer}
.task-label{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;font-family:'Crimson Pro',serif}
.task-label.done{color:#bbb;text-decoration:line-through}
.task-label.skipped{color:var(--skip);opacity:.7;text-decoration:line-through}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.block-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:7px;text-transform:uppercase;letter-spacing:.04em;font-family:'Crimson Pro',serif}
.task-dur{font-size:11px;color:var(--sage);font-weight:600;font-family:'Crimson Pro',serif}
.task-dur.skipped{color:var(--skip);opacity:.6}
.task-actions{display:flex;gap:6px;flex-shrink:0;margin-top:2px}
.task-edit-btn,.task-del-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s}
.task-edit-btn:hover{border-color:var(--terra);background:var(--terra-p)}
.task-del-btn:hover{border-color:var(--skip);background:var(--skip-p)}
.task-detail{padding:0 14px 13px 48px;font-size:13px;color:var(--ink-m);line-height:1.7;animation:fadeIn .15s ease;font-family:'Crimson Pro',serif}
.task-chevron{font-size:13px;color:#ccc;flex-shrink:0;margin-top:4px;transition:transform .15s;cursor:pointer}
.task-chevron.open{transform:rotate(90deg)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── EDIT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,25,0.5);z-index:300;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%}
.modal-title{font-family:'Lora',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:14px}
.modal-label{font-size:11px;font-weight:700;color:var(--ink-l);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:12px}
.modal-input{width:100%;background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Crimson Pro',serif;font-size:15px;color:var(--ink);transition:border-color .2s}
.modal-input:focus{outline:none;border-color:var(--terra)}
.modal-textarea{width:100%;background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink);resize:vertical;min-height:80px;line-height:1.5}
.modal-textarea:focus{outline:none;border-color:var(--terra)}
.modal-row{display:flex;gap:8px;margin-top:16px}
.modal-btn-save{flex:1;background:var(--terra);color:#fff;border:none;border-radius:9px;padding:12px;font-family:'Lora',serif;font-size:15px;cursor:pointer;transition:background .2s}
.modal-btn-save:hover{background:var(--ink)}
.modal-btn-cancel{padding:12px 20px;background:var(--sand);color:var(--ink-l);border:1px solid var(--border);border-radius:9px;font-family:'Crimson Pro',serif;font-size:15px;cursor:pointer}

/* ── ADD TASK ── */
.add-task-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-top:1px solid var(--border)}
.add-task-input{flex:1;background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink)}
.add-task-input:focus{outline:none;border-color:var(--terra)}
.add-task-input::placeholder{color:var(--ink-l);font-style:italic}
.add-task-btn{padding:8px 14px;background:var(--terra);color:#fff;border-radius:8px;font-family:'Crimson Pro',serif;font-size:13px;font-weight:600;white-space:nowrap}

/* ── SKIP LEGEND ── */
.legend-row{display:flex;gap:12px;padding:6px 14px 8px;background:#fff;border-bottom:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-l)}

/* ── WEEK CARDS ── */
.week-card{background:#fff;border-bottom:1px solid var(--border);cursor:pointer;padding:13px 14px;display:flex;align-items:center;justify-content:space-between}
.wc-left{flex:1;min-width:0}
.wc-title{font-family:'Lora',serif;font-size:14px;font-weight:500;color:var(--ink)}
.wc-theme{font-size:12px;color:var(--ink-l);margin-top:2px;font-style:italic}
.wc-prog{display:flex;align-items:center;gap:8px;margin-top:7px}
.wc-bar{flex:1;height:3px;background:var(--sand-dd);border-radius:2px;overflow:hidden}
.wc-fill{height:100%;border-radius:2px;transition:width .3s}
.wc-pct{font-size:10px;color:var(--ink-l);white-space:nowrap}
.wc-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0;margin-left:10px}
.wc-arrow{font-size:14px;color:#ccc;margin-left:8px}

/* ── TAB ROW ── */
.tab-row{display:flex;background:#fff;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:11px 0;font-family:'Crimson Pro',serif;font-size:13px;font-weight:400;color:#aaa;background:none;border:none;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{font-weight:600;color:var(--ink);border-bottom:2px solid var(--terra)}

/* ── WEEK STATE ── */
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.state-card{padding:13px;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:all .15s}
.state-card.active{border-color:currentColor;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.state-name{font-family:'Lora',serif;font-size:13px;font-weight:500}
.state-desc{font-size:11px;margin-top:3px;opacity:.8;line-height:1.4}
.score-section{padding:12px 14px;border-top:1px solid var(--border)}
.score-label{font-size:10px;font-weight:700;color:var(--ink-l);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.score-input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-family:'Crimson Pro',serif;font-size:14px;background:var(--sand);color:var(--ink)}

/* ── MEASURES / M-ROW ── */
.m-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(92,79,58,0.07);background:#fff}
.m-left{flex:1}
.m-goal{font-size:13px;font-weight:500;color:var(--ink);font-family:'Crimson Pro',serif}
.m-track{font-size:11px;color:var(--ink-l);margin-top:1px}
.m-target{font-size:14px;font-weight:700;color:var(--sage);font-family:'Lora',serif}

/* ── REFERENCE ── */
.ref-section{margin:8px 14px;background:#fff;border-radius:13px;overflow:hidden;border:1px solid var(--border)}
.ref-head{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ref-title{font-family:'Lora',serif;font-size:13px;font-weight:500;color:var(--ink)}
.ref-arrow{font-size:13px;color:#ccc;transition:transform .15s}
.ref-arrow.open{transform:rotate(90deg)}
.ref-body{padding:0 14px 14px}
.ref-item{padding:10px 0;border-top:1px solid rgba(92,79,58,0.07)}
.ref-item-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px;font-family:'Lora',serif}
.ref-item-body{font-size:12px;color:var(--ink-m);line-height:1.7}
.shortcut-tag{display:inline-block;background:#E6F1FB;color:#0C447C;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}
.habit-tag{display:inline-block;background:var(--sage-p);color:var(--sage);font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}

/* ── PARKING ── */
.p-item{padding:12px 14px;border-bottom:1px solid rgba(92,79,58,0.07);background:#fff}
.p-tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:var(--gold-p);color:var(--gold);margin-bottom:5px}
.p-text{font-size:13px;color:var(--ink);line-height:1.55}

/* ── ONBOARDING ── */
.ob-wrap{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.ob-body{flex:1;overflow-y:auto;padding:50px 26px 26px;display:flex;flex-direction:column;justify-content:center}
.ob-title{font-family:'Lora',Georgia,serif;font-size:26px;font-weight:500;line-height:1.2;margin-bottom:14px}
.ob-text{font-size:14px;line-height:1.9;opacity:.88;font-family:'Crimson Pro',serif}
.ob-foot{padding:16px 24px 40px;border-top:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:space-between}
.ob-dots{display:flex;gap:6px;align-items:center}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(0,0,0,.2);transition:width .2s}
.ob-dot.active{width:24px;background:rgba(0,0,0,.45)}
.ob-btn{padding:13px 30px;border-radius:14px;background:rgba(0,0,0,.7);color:#fff;font-family:'Lora',serif;font-size:15px;font-weight:500}
.ob-skip{font-family:'Crimson Pro',serif;font-size:13px;color:rgba(0,0,0,.35);background:none;border:none;cursor:pointer}

/* ── MISC ── */
.back-btn{display:flex;align-items:center;gap:6px;padding:12px 14px 8px;color:var(--ink-l);font-size:14px;background:none;border:none;cursor:pointer;font-family:'Crimson Pro',serif}
.sec-label{padding:10px 14px 4px;font-size:10px;font-weight:700;color:var(--ink-l);text-transform:uppercase;letter-spacing:.06em}
.spacer{height:8px}
.card-wrap{margin:8px 14px;background:#fff;border-radius:13px;overflow:hidden;border:1px solid var(--border)}
.overall-card{margin:8px 14px;background:#fff;border-radius:13px;padding:16px;border:1px solid var(--border)}
.overall-pct{font-family:'Lora',serif;font-size:38px;font-weight:500;color:var(--ink);line-height:1}
.overall-sub{font-size:12px;color:var(--ink-l);margin-top:4px}
.mvd-banner{margin:10px 14px;background:#EEEDFE;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.mvd-icon{font-size:20px;flex-shrink:0}
.mvd-title{font-family:'Lora',serif;font-size:13px;font-weight:500;color:#3C3489}
.mvd-body{font-size:12px;color:#534AB7;margin-top:2px;line-height:1.5}

/* ── VISION & GOALS ── */
.vision-banner{background:var(--ink);border-radius:13px;padding:24px 20px;margin:10px 14px;position:relative;overflow:hidden}
.vision-banner::before{content:'Vision';position:absolute;right:-6px;top:-8px;font-family:'Lora',serif;font-size:70px;font-style:italic;color:rgba(245,240,232,0.05);pointer-events:none;line-height:1}
.vision-banner-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--terra-l);margin-bottom:8px;font-family:'Crimson Pro',serif}
.vision-banner-title{font-family:'Lora',serif;font-size:20px;color:var(--sand);margin-bottom:6px}
.vision-banner-body{font-size:14px;color:rgba(245,240,232,0.6);line-height:1.6;font-style:italic}
.area-card{background:#fff;border:1px solid var(--border);border-radius:13px;margin:8px 14px;overflow:hidden}
.area-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(245,240,232,0.5)}
.area-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.area-name{font-family:'Lora',serif;font-size:15px;font-weight:500;color:var(--ink)}
.area-body{padding:14px 16px 16px}
.prompt-row{margin-bottom:16px}
.prompt-row:last-child{margin-bottom:0}
.prompt-starter{font-size:13px;color:var(--terra);margin-bottom:5px;font-style:italic}
.prompt-input{width:100%;background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Crimson Pro',serif;font-size:15px;color:var(--ink);resize:vertical;min-height:62px;transition:border-color .2s;line-height:1.5}
.prompt-input:focus{outline:none;border-color:var(--terra)}
.prompt-input::placeholder{color:var(--ink-l);font-style:italic}
.goal-card{background:#fff;border:1px solid var(--border);border-radius:13px;margin:8px 14px;overflow:hidden}
.goal-card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 0}
.goal-num{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);font-family:'Crimson Pro',serif;font-weight:700}
.goal-del{background:none;border:none;font-size:17px;color:var(--ink-l);cursor:pointer;padding:0 2px;line-height:1;transition:color .2s}
.goal-del:hover{color:#b33}
.goal-body{padding:8px 16px 18px}
.goal-title-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:4px 0 9px;font-family:'Lora',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:16px;transition:border-color .2s}
.goal-title-input:focus{outline:none;border-bottom-color:var(--terra)}
.goal-title-input::placeholder{color:var(--ink-l);font-weight:400;font-style:italic;font-family:'Crimson Pro',serif;font-size:15px}
.goal-sec-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-l);margin-bottom:8px;margin-top:14px}
.tactic-row-g{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.tactic-dot{width:6px;height:6px;border-radius:50%;background:var(--terra-l);flex-shrink:0}
.tactic-input{flex:1;background:var(--sand);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink);transition:border-color .2s}
.tactic-input:focus{outline:none;border-color:var(--terra)}
.tactic-input::placeholder{color:var(--ink-l);font-style:italic}
.tactic-rm{background:none;border:none;color:var(--ink-l);cursor:pointer;font-size:15px;padding:0 3px;flex-shrink:0;transition:color .2s}
.tactic-rm:hover{color:#b33}
.note-area{width:100%;background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink);resize:vertical;min-height:72px;line-height:1.5;transition:border-color .2s}
.note-area:focus{outline:none;border-color:var(--terra)}
.note-area::placeholder{color:var(--ink-l);font-style:italic}
.add-tactic-btn{background:transparent;border:1px dashed var(--border-m);border-radius:7px;padding:6px 12px;font-family:'Crimson Pro',serif;font-size:13px;color:var(--ink-l);cursor:pointer;width:100%;text-align:left;margin-top:4px;transition:all .2s}
.add-tactic-btn:hover{border-color:var(--terra);color:var(--terra)}
.add-goal-wrap{margin:4px 14px 8px}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){

function getDayPct(weekNum,dayIdx){
  var tasks=getDayTasks(weekNum,dayIdx);
  var done=tasks.filter(function(t){return S.checked[t.id]==="done";}).length;
  return tasks.length>0?Math.round((done/tasks.length)*100):0;
}

function getWeekPct(wm){
  if(!wm.hasDays){
    var s=wm.setup||[];var d=s.filter(function(_,i){return S.checked["w"+wm.week+"s"+i]==="done";}).length;
    return s.length>0?Math.round((d/s.length)*100):0;
  }
  var total=0,done=0;
  for(var d2=0;d2<7;d2++){var t=getDayTasks(wm.week,d2);total+=t.length;done+=t.filter(function(t){return S.checked[t.id]==="done";}).length;}
  return total>0?Math.round((done/total)*100):0;
}

/* Get tasks for a day, applying edits/deletes/custom additions */
function getDayTasks(weekNum,dayIdx){
  var base=getTasks(weekNum,dayIdx);
  var result=[];
  base.forEach(function(t,i){
    var id="w"+weekNum+"d"+dayIdx+"t"+i;
    if(S.deleted[id]) return;
    var override=S.edits[id];
    if(override){
      result.push(Object.assign({},t,override,{id:id}));
    } else {
      result.push(Object.assign({},t,{id:id}));
    }
  });
  var cKey="w"+weekNum+"d"+dayIdx;
  var custom=S.customTasks[cKey]||[];
  custom.forEach(function(ct){
    if(!S.deleted[ct.id]) result.push(ct);
  });
  return result;
}

      ]}
    ];
    var cards=areas.map(function(area){
      return div("area-card",[
        div("area-head",[el("div",{class:"area-icon",style:{background:area.bg}},area.icon),el("div",{class:"area-name"},area.name)]),
        div("area-body",area.prompts.map(function(p){
          return div("prompt-row",[el("div",{class:"prompt-starter"},p.s),el("textarea",{class:"prompt-input",id:p.id,placeholder:p.ph,oninput:function(){saveVision();}},null)]);
        }))
      ]);
    });
    content=div("",[
      div("vision-banner",[
        div("vision-banner-eyebrow","3-Year Vision"),
        el("div",{class:"vision-banner-title"},"Begin with the end"),
        el("div",{class:"vision-banner-body"},"Vivid vision creates the fuel that sustains execution through the hard weeks. Write what you actually want, not what sounds reasonable.")
      ]),
      div("",cards),
      div("btn-row",[btn("btn-primary","Save Vision",function(){saveVision();}),el("span",{class:"save-msg",id:"save-vision-msg"},"Saved")])
    ]);
    setTimeout(function(){VISION_FIELDS.forEach(function(id){var e=document.getElementById(id);if(e&&S.vision[id]) e.value=S.vision[id];});},0);
  } else {
    var anchors=[
      {key:"v-career-2",area:"Career vision"},
      {key:"v-fin-2",area:"Financial vision"},
      {key:"v-grow-1",area:"Personal growth"},
      {key:"v-spirit-2",area:"Purpose & legacy"}
    ].filter(function(a){return S.vision[a.key]&&S.vision[a.key].trim();});
    var anchorSection=anchors.length
      ?div("vision-anchor-wrap",[el("div",{class:"vision-anchor-lbl"},"Your why — from the vision"),div("",anchors.map(function(a){return div("vision-anchor",[el("div",{class:"vision-anchor-area"},a.area),document.createTextNode(S.vision[a.key])]);}))])
      :div("empty-state","Complete your Vision first — it will appear here as your anchor for why these goals matter.");
    var goalCards=S.goals.map(function(g,i){
      var tacticRows=g.tactics.map(function(t,ti){
        return div("tactic-row-g",[
          div("tactic-dot",null),
          el("input",{class:"tactic-input",type:"text",id:"g-tac-"+g.id+"-"+ti,value:esc(t),placeholder:"What will you do every week?",oninput:function(){saveGoals();}},null),
          ti>0?el("button",{class:"tactic-rm",onClick:function(){g.tactics.splice(ti,1);sv("gls6",S.goals);render();}},"×"):null
        ].filter(Boolean));
      });
      return div("goal-card",[
        div("goal-card-head",[
          el("div",{class:"goal-num"},"Goal "+(i+1)),
          S.goals.length>1?el("button",{class:"goal-del",onClick:function(){if(!confirm("Remove this goal?"))return;S.goals.splice(i,1);sv("gls6",S.goals);render();}},"×"):null
        ].filter(Boolean)),
        div("goal-body",[
          el("input",{class:"goal-title-input",type:"text",id:"g-title-"+g.id,value:esc(g.text),placeholder:"What will you achieve in these 12 weeks?",oninput:function(){saveGoals();}},null),
          el("div",{class:"goal-sec-label"},"Weekly tactics"),
          div("",tacticRows),
          el("button",{class:"add-tactic-btn",onClick:function(){if(g.tactics.length>=7)return;g.tactics.push("");sv("gls6",S.goals);render();}},"+ add tactic"),
          el("div",{class:"goal-sec-label",style:{marginTop:"16px"}},"Notes & context"),
          el("textarea",{class:"note-area",id:"g-note-"+g.id,placeholder:"Why does this goal matter? What obstacles might get in the way? Any relevant context…",oninput:function(){saveGoals();}},null)
        ])
      ]);
    });
    setTimeout(function(){S.goals.forEach(function(g){var ne=document.getElementById("g-note-"+g.id);if(ne) ne.value=g.note||"";});},0);
    content=div("",[
      el("div",{class:"sprint-badge"},"◆ Sprint 1 — Weeks 1–12"),
      anchorSection,
      div("",goalCards),
      S.goals.length<5?div("add-goal-wrap",[btn("add-goal-btn","+ Add another goal",function(){S.goals.push({id:uid(),text:"",tactics:["","",""],note:""});sv("gls6",S.goals);render();})]):null,
      div("btn-row",[btn("btn-primary","Save Goals",function(){saveGoals();}),el("span",{class:"save-msg",id:"save-goals-msg"},"Saved")])
    ].filter(Boolean));
  }
  return div("",[
    el("div",{class:"hdr"},[el("div",{class:"hdr-title"},"Vision & Goals"),el("div",{class:"hdr-sub"},"Your 3-year picture and 12-week plan")]),
    tabRow,content,bottomNav()
  ]);
}

/* ── MEASURES ── */
function buildMeasures(){
  return div("",[
    el("div",{class:"hdr"},[el("div",{class:"hdr-title"},"Lead Measures"),el("div",{class:"hdr-sub"},"Track these weekly, not outcomes")]),
    div("spacer",null),
    div("card-wrap",MEASURES.map(function(m){return div("m-row",[div("m-left",[el("div",{class:"m-goal"},m.goal),el("div",{class:"m-track"},m.track)]),el("div",{class:"m-target"},m.target)]);})),
    bottomNav()
  ]);
}

/* ── REFERENCE ── */
function buildReference(){
  var sections=REFERENCE.map(function(sec,si){
    var open=!!S.refOpen[si];
    var head=div("ref-head",[el("div",{class:"ref-title"},sec.title),el("div",{class:"ref-arrow"+(open?" open":"")},">")]);
    head.addEventListener("click",function(){S.refOpen[si]=!S.refOpen[si];render();});
    var section=div("ref-section",[head]);
    if(open){
      var body=div("ref-body",sec.items.map(function(item){
        return div("ref-item",[el("span",{class:sec.tag==="shortcut"?"shortcut-tag":"habit-tag"},sec.tag==="shortcut"?"Shortcut":"Habit"),el("div",{class:"ref-item-title"},item.title),el("div",{class:"ref-item-body"},item.body)]);
      }));
      section.appendChild(body);
    }
    return section;
  });
  return div("",[
    el("div",{class:"hdr"},[el("div",{class:"hdr-title"},"Reference"),el("div",{class:"hdr-sub"},"Shortcuts, habit stacks, and guides")]),
    div("spacer",null),div("",sections),bottomNav()
  ]);
}

/* ── PARKING ── */
function buildParking(){
  return div("",[
    el("div",{class:"hdr"},[el("div",{class:"hdr-title"},"Parking Lot"),el("div",{class:"hdr-sub"},"Deferred decisions")]),
    div("spacer",null),
    div("card-wrap",PARKING.map(function(p){return div("p-item",[div("p-tag",p.tag),div("p-text",p.text)]);})),
    bottomNav()
  ]);
}

/* ── ROUTER ── */
function buildView(){
  var wrap=div("",null);
  if(S.onboarding){wrap.appendChild(buildOnboarding());return wrap;}
  if     (S.view==="today")       wrap.appendChild(buildToday());
  else if(S.view==="weeks")       wrap.appendChild(buildWeeks());
  else if(S.view==="weekDetail")  wrap.appendChild(buildWeekDetail());
  else if(S.view==="visionGoals") wrap.appendChild(buildVisionGoals());
  else if(S.view==="measures")    wrap.appendChild(buildMeasures());
  else if(S.view==="reference")   wrap.appendChild(buildReference());
  else if(S.view==="parking")     wrap.appendChild(buildParking());
  return wrap;
}

load();render();
</script>
</body>
</html>
